{% extends 'base.html' %}

{% block title %}Excluir colaborador | Controle Oficina{% endblock %}

{% block content %}
  <div class='mx-auto max-w-xl rounded-xl border border-[#262626] bg-[#1A1A1A] p-6'>
    <h1 class='text-2xl font-semibold text-[#D4AF37]'>Excluir colaborador</h1>
    <p class='mt-4 text-sm text-[#A3A3A3]'>Tem certeza que deseja excluir <span class='text-[#F5F5F5]'>{{ object.name }}</span>?</p>

    <form method='post' class='mt-6 flex flex-wrap gap-3'>
      {% csrf_token %}
      <button type='submit' class='rounded-md bg-gradient-to-r from-[#D4AF37] to-[#AA882C] px-4 py-2 font-semibold text-[#0D0D0D]'>
        Excluir
      </button>
      <a href='{% url "users:collaborator_list" %}' class='rounded-md border border-[#404040] bg-[#262626] px-4 py-2 hover:border-[#D4AF37]'>
        Cancelar
      </a>
    </form>
  </div>
{% endblock %}
