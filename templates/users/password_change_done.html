{% extends 'base.html' %}

{% block title %}Senha alterada | Controle Oficina{% endblock %}

{% block content %}
  <div class='mx-auto max-w-md rounded-xl border border-[#262626] bg-[#1A1A1A] p-6'>
    <h1 class='text-2xl font-semibold text-[#D4AF37]'>Senha alterada</h1>
    <p class='mt-2 text-sm text-[#A3A3A3]'>Sua senha foi atualizada com sucesso.</p>
    <div class='mt-6 flex justify-end'>
      {% if user.role == 'VISUAL' %}
        <a href='{% url "budgets:kanban_today" %}' class='rounded-md bg-gradient-to-r from-[#D4AF37] to-[#AA882C] px-4 py-2 font-semibold text-[#0D0D0D]'>
          Ir para o kanban
        </a>
      {% else %}
        <a href='{% url "core:dashboard" %}' class='rounded-md bg-gradient-to-r from-[#D4AF37] to-[#AA882C] px-4 py-2 font-semibold text-[#0D0D0D]'>
          Ir para o sistema
        </a>
      {% endif %}
    </div>
  </div>
{% endblock %}
